---
name: "Test & Lint"

on:
  push:

# Least-privilege: this workflow only checks out and builds.
permissions:
  contents: read

jobs:
  test:
    name: "Test & Lint"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v7

      - name: "Setup Node.js"
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: "Install dependencies"
        run: npm ci

      - name: "Run linter"
        run: npm run lint

      - name: "Run tests"
        run: npm run test

      - name: "Build"
        run: npm run build
